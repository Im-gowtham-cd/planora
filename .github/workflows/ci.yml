name: Planora CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Backend
        run: |
          cd server
          npm install

      - name: Install Frontend
        run: |
          cd client
          npm install

      - name: Build Frontend
        run: |
          cd client
          npm run build