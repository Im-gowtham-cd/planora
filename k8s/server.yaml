apiVersion: apps/v1
kind: Deployment
metadata:
  name: planora-server
  labels:
    app: server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      containers:
      - name: server
        image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/planora-server
        ports:
        - containerPort: 5000
        env:
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: planora-secrets
              key: gemini-api-key
---
apiVersion: v1
kind: Service
metadata:
  name: planora-server-service
spec:
  selector:
    app: server
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: ClusterIP