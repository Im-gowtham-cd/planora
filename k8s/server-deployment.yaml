apiVersion: apps/v1
kind: Deployment
metadata:
  name: planora-server

spec:
  replicas: 2

  selector:
    matchLabels:
      app: server

  template:
    metadata:
      labels:
        app: server

    spec:
      containers:
        - name: server
          image: 232420921471.dkr.ecr.us-east-1.amazonaws.com/planora-server
          ports:
            - containerPort: 5000