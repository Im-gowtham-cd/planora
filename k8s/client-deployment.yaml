apiVersion: apps/v1
kind: Deployment
metadata:
  name: planora-client

spec:
  replicas: 2

  selector:
    matchLabels:
      app: client

  template:
    metadata:
      labels:
        app: client

    spec:
      containers:
        - name: client
          image: 232420921471.dkr.ecr.us-east-1.amazonaws.com/planora-client
          ports:
            - containerPort: 80